<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
<title>Login - Apna Ghar</title>
<style>
:root {
    --bg-primary: #f5f5f5;
    --bg-secondary: #ffffff;
    --text-primary: #333333;
    --text-secondary: #666666;
    --header-bg: #2c3e50;
    --card-bg: #ffffff;
    --shadow: 0 4px 20px rgba(0,0,0,0.1);
    --input-bg: #ffffff;
    --input-border: #ddd;
    --error-color: #ff4444;
    --success-color: #44ff44;
}

[data-theme="dark"] {
    --bg-primary: #1a1a1a;
    --bg-secondary: #2d2d2d;
    --text-primary: #ffffff;
    --text-secondary: #cccccc;
    --header-bg: #1e1e1e;
    --card-bg: #2d2d2d;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
    --input-bg: #3d3d3d;
    --input-border: #555;
    --error-color: #ff8888;
    --success-color: #88ff88;
}

header{
    background:var(--header-bg);
    color:beige;
    padding:10px 0;
    position:fixed;
    top:0;
    width:100%;
    z-index:1000;
}
.nav-container{
    width:90%;
    max-width:1100px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}
.logo{
    display:flex;
    align-items:center;
    font-size:1.4rem;
    font-weight:bold;
    color:white;
}
.logo img{
    height:40px;
    margin-right:8px;
    border-radius:100px;
}
nav a{
    color:white;
    margin-left:20px;
    text-decoration:none;
    font-weight:bold;
}
nav a:hover{
    text-decoration:underline;
}
nav a.active{
    background-color:#ff9800;
    border-radius:5px;
    padding:5px 10px;
}
#ownerDashboardLink {
    display: none;
}
#theme-toggle {
    background:none;
    border:none;
    font-size:1.5rem;
    cursor:pointer;
    margin-left:15px;
    color:white;
}

body{
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background-color:var(--bg-primary);
    color:var(--text-primary);
    margin:0;
    padding:0;
    transition: all 0.3s ease;
}

.login-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:calc(100vh - 70px);
    padding:20px;
    margin-top:60px;
}
.login-box{
    background:var(--card-bg);
    padding:2.5rem;
    border-radius:8px;
    box-shadow:var(--shadow);
    width:100%;
    max-width:400px;
    text-align:center;
}
.login-box h2{
    margin-bottom:1.5rem;
    color:#ff9800;
}

.input-group{
    margin-bottom:1.2rem;
    text-align:left;
    position:relative;
}
.input-group input, .input-group select{
    width:100%;
    padding:12px 15px;
    border:1px solid var(--input-border);
    border-radius:4px;
    font-size:1rem;
    transition:all 0.3s;
    background:var(--input-bg);
    color:var(--text-primary);
}
.input-group input:focus, .input-group select:focus{
    border-color:#ff9800;
    outline:none;
    box-shadow:0 0 0 3px rgba(255,152,0,0.1);
}

.password-toggle {
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:var(--text-secondary);
    user-select:none;
}

.remember-group {
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:1.2rem;
}

.remember-group input {
    width:auto;
    margin:0;
}

.login-btn{
    width:100%;
    padding:12px;
    background-color:#ff9800;
    color:white;
    border:none;
    border-radius:4px;
    font-size:1rem;
    cursor:pointer;
    transition:all 0.3s;
    font-weight:bold;
}
.login-btn:hover{
    background-color:#f57c00;
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(255,152,0,0.3);
}
.login-btn:disabled {
    opacity:0.6;
    cursor:not-allowed;
    transform:none;
}

.error-message {
    color:var(--error-color);
    font-size:0.85rem;
    margin-top:5px;
    display:none;
}

.demo-credentials {
    margin-top:1.5rem;
    padding:15px;
    background:rgba(255,152,0,0.1);
    border-radius:8px;
    font-size:0.9rem;
    border:1px dashed #ff9800;
}

.demo-credentials p {
    margin:5px 0;
    color:var(--text-secondary);
}

.demo-credentials strong {
    color:#ff9800;
}

.footer-text{
    margin-top:1.5rem;
    color:var(--text-secondary);
}
.footer-text a{
    color:#ff9800;
    text-decoration:none;
    font-weight:bold;
}
.footer-text a:hover{
    text-decoration:underline;
}

footer{
    background-color:var(--header-bg);
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}

@media(max-width:768px){
    .nav-container{
        flex-direction:column;
    }
    nav{
        margin:10px 0;
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
    }
    nav a{
        margin:5px;
    }
}
</style>
</head>
<body>

<header>
<div class="nav-container">
<div class="logo"><img src="/image/logo.jpg" alt="Logo">Apna Ghar</div>
<nav>
<a href="home.html">Home</a>
<a href="services.html">Services</a>
<a href="aboutus.html">About Us</a>
<a href="contact.html">Contact</a>
<a href="owner-dashboard.html" id="ownerDashboardLink">Dashboard</a>
<a href="log.html" class="active">Login</a>
</nav>
<button id="theme-toggle">🌙</button>
</div>
</header>

<div class="login-container">
<div class="login-box">
<h2>🔐 Login to Apna Ghar</h2>

<form id="loginForm">
<div class="input-group">
<select id="loginRole" required>
<option value="">Select Account Type</option>
<option value="customer">👤 Customer (Find Property)</option>
<option value="owner">👑 Property Owner</option>
</select>
</div>

<div class="input-group">
<input type="email" id="email" placeholder="Email Address" required>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password" required>
<span class="password-toggle" onclick="togglePassword()">👁️</span>
</div>

<div class="remember-group">
<input type="checkbox" id="remember">
<label for="remember">Remember me</label>
</div>

<div id="errorMsg" class="error-message"></div>

<button type="submit" class="login-btn" id="loginBtn">Login</button>
</form>

<div class="demo-credentials">
<p><strong>📋 Demo Credentials:</strong></p>
<p>👤 Customer: customer@demo.com / password123</p>
<p>👑 Owner: owner@demo.com / password123</p>
</div>

<div class="footer-text">
Don't have an account? <a href="signup.html">Register Now</a>
</div>
</div>
</div>

<footer>&copy; 2025 Apna Ghar. All rights reserved.</footer>

<script>
// ========== LOGIN PAGE FIXED SCRIPT ==========

/* 1. THEME MANAGEMENT */
(function() {
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    
    const themeBtn = document.getElementById('theme-toggle');
    if(themeBtn) {
        themeBtn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        
        themeBtn.onclick = function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        };
    }
})();

/* 2. PASSWORD TOGGLE */
function togglePassword() {
    const password = document.getElementById('password');
    const type = password.type === 'password' ? 'text' : 'password';
    password.type = type;
}

/* 3. CHECK IF ALREADY LOGGED IN */
(function() {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    const dashboardLink = document.getElementById('ownerDashboardLink');
    
    if(currentUser) {
        // Already logged in - ask to logout first
        if(confirm('You are already logged in. Do you want to logout first?')) {
            localStorage.removeItem('currentUser');
            window.location.reload();
        } else {
            // Redirect to appropriate page
            if(currentUser.role === 'owner') {
                window.location.href = 'owner-dashboard.html';
            } else {
                window.location.href = 'home.html';
            }
        }
    }
    
    // Show dashboard link for owners
    if(currentUser && currentUser.role === 'owner' && dashboardLink) {
        dashboardLink.style.display = 'inline-block';
    }
})();

/* 4. REMEMBER ME FUNCTIONALITY */
(function() {
    const rememberedEmail = localStorage.getItem('rememberedEmail');
    if(rememberedEmail) {
        document.getElementById('email').value = rememberedEmail;
        document.getElementById('remember').checked = true;
    }
})();

/* 5. LOGIN FORM SUBMISSION */
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const role = document.getElementById('loginRole').value;
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked;
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    
    // Reset error
    errorMsg.style.display = 'none';
    errorMsg.textContent = '';
    
    // Validate role
    if(!role) {
        errorMsg.textContent = '❌ Please select account type';
        errorMsg.style.display = 'block';
        return;
    }
    
    // Validate email
    if(!email || !email.includes('@') || !email.includes('.')) {
        errorMsg.textContent = '❌ Please enter valid email';
        errorMsg.style.display = 'block';
        return;
    }
    
    // Validate password
    if(!password || password.length < 6) {
        errorMsg.textContent = '❌ Password must be at least 6 characters';
        errorMsg.style.display = 'block';
        return;
    }
    
    // Disable button while processing
    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';
    
    // Simulate network delay
    setTimeout(() => {
        // Get users from localStorage
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        
        // Add demo users if not exist
        if(users.length === 0) {
            users = [
                {
                    id: 'CUST' + Date.now(),
                    role: 'customer',
                    name: 'Demo Customer',
                    email: 'customer@demo.com',
                    password: 'password123',
                    joinDate: new Date().toISOString()
                },
                {
                    id: 'OWNER' + Date.now(),
                    role: 'owner',
                    name: 'Demo Owner',
                    email: 'owner@demo.com',
                    password: 'password123',
                    joinDate: new Date().toISOString()
                }
            ];
            localStorage.setItem('users', JSON.stringify(users));
        }
        
        // Find user
        const user = users.find(u => u.email === email && u.password === password);
        
        if(user) {
            // Check if role matches
            if(user.role !== role) {
                errorMsg.textContent = `❌ This account is registered as ${user.role}, not as ${role}`;
                errorMsg.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
                return;
            }
            
            // Save login
            localStorage.setItem('currentUser', JSON.stringify(user));
            
            // Remember me
            if(remember) {
                localStorage.setItem('rememberedEmail', email);
            } else {
                localStorage.removeItem('rememberedEmail');
            }
            
            alert('✅ Login successful!');
            
            // Redirect based on role
            if(role === 'owner') {
                window.location.href = 'owner-dashboard.html';
            } else {
                window.location.href = 'home.html';
            }
        } else {
            errorMsg.textContent = '❌ Invalid email or password';
            errorMsg.style.display = 'block';
            loginBtn.disabled = false;
            loginBtn.textContent = 'Login';
        }
    }, 1000);
});

/* 6. AUTO-FOCUS EMAIL */
window.addEventListener('load', function() {
    document.getElementById('email').focus();
});

/* 7. ENTER KEY HANDLER */
document.getElementById('password').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') {
        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
    }
});
</script>
</body>
</html>
