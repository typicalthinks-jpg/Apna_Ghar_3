<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
<title>Sign Up - Apna Ghar</title>
<style>
:root {
    --bg-primary: #f5f5f5;
    --bg-secondary: #ffffff;
    --text-primary: #333333;
    --text-secondary: #666666;
    --header-bg: #2c3e50;
    --card-bg: #ffffff;
    --shadow: 0 4px 20px rgba(0,0,0,0.1);
    --input-bg: #ffffff;
    --input-border: #ddd;
    --error-color: #ff4444;
    --success-color: #44ff44;
    --weak-color: #ff4444;
    --medium-color: #ffbb33;
    --strong-color: #44ff44;
}

[data-theme="dark"] {
    --bg-primary: #1a1a1a;
    --bg-secondary: #2d2d2d;
    --text-primary: #ffffff;
    --text-secondary: #cccccc;
    --header-bg: #1e1e1e;
    --card-bg: #2d2d2d;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
    --input-bg: #3d3d3d;
    --input-border: #555;
    --error-color: #ff8888;
    --success-color: #88ff88;
}

body{
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background:var(--bg-primary);
    color:var(--text-primary);
    margin:0;
    padding:0;
    margin-top:60px;
    transition: all 0.3s ease;
}

header{
    background:var(--header-bg);
    color:beige;
    padding:10px 0;
    position:fixed;
    top:0;
    width:100%;
    z-index:1000;
}
.nav-container{
    width:90%;
    max-width:1100px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}
.logo{
    display:flex;
    align-items:center;
    font-size:1.4rem;
    font-weight:bold;
    color:white;
}
.logo img{
    height:40px;
    margin-right:8px;
    border-radius:100px;
}
nav a{
    color:white;
    margin-left:20px;
    text-decoration:none;
    font-weight:bold;
}
nav a:hover{
    text-decoration:underline;
}
nav a.active{
    background-color:#ff9800;
    border-radius:5px;
    padding:5px 10px;
}
#ownerDashboardLink {
    display: none;
}
#theme-toggle {
    background:none;
    border:none;
    font-size:1.5rem;
    cursor:pointer;
    margin-left:15px;
    color:white;
}

.form-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:calc(100vh - 70px);
    padding:20px;
}
.form-box{
    background:var(--card-bg);
    padding:2.5rem;
    border-radius:8px;
    box-shadow:var(--shadow);
    width:100%;
    max-width:500px;
}
.form-box h2{
    text-align:center;
    margin-bottom:1.5rem;
    color:#ff9800;
}

.input-group{
    margin-bottom:1.2rem;
    position:relative;
}
.input-group input, .input-group select{
    width:100%;
    padding:12px 15px;
    border:1px solid var(--input-border);
    border-radius:4px;
    font-size:1rem;
    transition:all 0.3s;
    background:var(--input-bg);
    color:var(--text-primary);
}
.input-group input:focus, .input-group select:focus{
    border-color:#ff9800;
    outline:none;
    box-shadow:0 0 0 3px rgba(255,152,0,0.1);
}

.input-group.error input {
    border-color: var(--error-color);
}

.input-group.success input {
    border-color: var(--success-color);
}

.error-message {
    color: var(--error-color);
    font-size: 0.8rem;
    margin-top: 5px;
    display: none;
}

.password-strength {
    height: 5px;
    margin-top: 5px;
    border-radius: 5px;
    background: #ddd;
    overflow: hidden;
}

.strength-bar {
    height: 100%;
    width: 0;
    transition: width 0.3s;
}

.strength-weak { background: var(--weak-color); width: 33.33%; }
.strength-medium { background: var(--medium-color); width: 66.66%; }
.strength-strong { background: var(--strong-color); width: 100%; }

.strength-text {
    font-size: 0.8rem;
    margin-top: 5px;
    text-align: right;
}

.terms-group {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 15px 0;
}

.terms-group input {
    width: auto;
    margin: 0;
}

.terms-group label {
    font-size: 0.9rem;
    color: var(--text-secondary);
}

.terms-group a {
    color: #ff9800;
    text-decoration: none;
}

.submit-btn{
    width:100%;
    padding:12px;
    background:#ff9800;
    color:white;
    border:none;
    border-radius:4px;
    font-size:1rem;
    cursor:pointer;
    transition:all 0.3s;
    margin-top:1rem;
    font-weight:bold;
}
.submit-btn:hover{
    background:#f57c00;
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(255,152,0,0.3);
}
.submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.login-link{
    text-align:center;
    margin-top:1.5rem;
    color:var(--text-secondary);
}
.login-link a{
    color:#ff9800;
    text-decoration:none;
    font-weight:bold;
}

footer{
    background:var(--header-bg);
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}

@media(max-width:768px){
    .nav-container{
        flex-direction:column;
    }
    nav{
        margin:10px 0;
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
    }
    nav a{
        margin:5px;
    }
}
</style>
</head>
<body>

<header>
<div class="nav-container">
<div class="logo"><img src="/image/logo.jpg" alt="logo">Apna Ghar</div>
<nav>
<a href="home.html">Home</a>
<a href="services.html">Services</a>
<a href="aboutus.html">About Us</a>
<a href="contact.html">Contact</a>
<a href="owner-dashboard.html" id="ownerDashboardLink">Dashboard</a>
<a href="log.html">Login</a>
<a href="signup.html" class="active">Sign Up</a>
</nav>
<button id="theme-toggle">🌙</button>
</div>
</header>

<div class="form-container">
<div class="form-box">
<h2>📝 Create Account</h2>

<form id="signupForm">
<div class="input-group">
<select id="signupRole" required>
<option value="">Select Account Type</option>
<option value="customer">👤 Customer (Looking for Property)</option>
<option value="owner">👑 Property Owner (Want to List Property)</option>
</select>
</div>

<div class="input-group">
<input type="text" id="name" placeholder="Full Name" required>
<div class="error-message" id="nameError"></div>
</div>

<div class="input-group">
<input type="tel" id="phone" placeholder="Phone Number (10 digits)" required maxlength="10">
<div class="error-message" id="phoneError"></div>
</div>

<div class="input-group">
<input type="email" id="email" placeholder="Email Address" required>
<div class="error-message" id="emailError"></div>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password" required>
<div class="password-strength">
<div class="strength-bar" id="strengthBar"></div>
</div>
<div class="strength-text" id="strengthText"></div>
<div class="error-message" id="passwordError"></div>
</div>

<div class="input-group">
<input type="password" id="confirmPassword" placeholder="Confirm Password" required>
<div class="error-message" id="confirmError"></div>
</div>

<div class="terms-group">
<input type="checkbox" id="terms" required>
<label for="terms">I agree to the <a href="#" onclick="alert('Terms & Conditions will be shown here')">Terms & Conditions</a> and <a href="#" onclick="alert('Privacy Policy will be shown here')">Privacy Policy</a></label>
</div>

<button type="submit" class="submit-btn" id="submitBtn">Sign Up</button>
<p class="login-link">Already Have Account? <a href="log.html">Login Here!</a></p>
</form>

</div>
</div>

<footer>&copy; 2025 Apna Ghar. All rights reserved.</footer>

<script>
// ========== SIGNUP PAGE FIXED SCRIPT ==========

/* 1. THEME MANAGEMENT */
(function() {
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    
    const themeBtn = document.getElementById('theme-toggle');
    if(themeBtn) {
        themeBtn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        
        themeBtn.onclick = function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        };
    }
})();

/* 2. DASHBOARD LINK CHECK */
(function() {
    const user = JSON.parse(localStorage.getItem('currentUser'));
    const dashboardLink = document.getElementById('ownerDashboardLink');
    
    if(user && user.role === 'owner' && dashboardLink) {
        dashboardLink.style.display = 'inline-block';
    }
})();

/* 3. PHONE VALIDATION - ONLY NUMBERS */
const phoneInput = document.getElementById('phone');
if(phoneInput) {
    phoneInput.addEventListener('input', function() {
        this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
    });
}

/* 4. PASSWORD STRENGTH CHECKER */
const passwordInput = document.getElementById('password');
const strengthBar = document.getElementById('strengthBar');
const strengthText = document.getElementById('strengthText');

if(passwordInput) {
    passwordInput.addEventListener('input', function() {
        const password = this.value;
        let strength = 0;
        
        // Check length
        if(password.length >= 8) strength++;
        if(password.length >= 12) strength++;
        
        // Check for numbers
        if(/\d/.test(password)) strength++;
        
        // Check for special characters
        if(/[!@#$%^&*]/.test(password)) strength++;
        
        // Check for uppercase
        if(/[A-Z]/.test(password)) strength++;
        
        // Update strength bar
        strengthBar.className = 'strength-bar';
        if(password.length === 0) {
            strengthBar.style.width = '0';
            strengthText.textContent = '';
        } else if(password.length < 6) {
            strengthBar.classList.add('strength-weak');
            strengthText.textContent = 'Weak';
            strengthText.style.color = 'var(--weak-color)';
        } else if(strength <= 2) {
            strengthBar.classList.add('strength-weak');
            strengthText.textContent = 'Weak';
            strengthText.style.color = 'var(--weak-color)';
        } else if(strength <= 4) {
            strengthBar.classList.add('strength-medium');
            strengthText.textContent = 'Medium';
            strengthText.style.color = 'var(--medium-color)';
        } else {
            strengthBar.classList.add('strength-strong');
            strengthText.textContent = 'Strong';
            strengthText.style.color = 'var(--strong-color)';
        }
    });
}

/* 5. EMAIL VALIDATION */
function isValidEmail(email) {
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return re.test(email);
}

/* 6. SIGNUP FORM SUBMISSION */
document.getElementById('signupForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    // Get form elements
    const role = document.getElementById('signupRole');
    const name = document.getElementById('name');
    const phone = document.getElementById('phone');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const confirm = document.getElementById('confirmPassword');
    const terms = document.getElementById('terms');
    const submitBtn = document.getElementById('submitBtn');
    
    // Reset error messages
    document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.input-group').forEach(el => {
        el.classList.remove('error', 'success');
    });
    
    let isValid = true;
    
    // Validate role
    if(!role.value) {
        showError(role, 'Please select account type');
        isValid = false;
    }
    
    // Validate name
    if(!name.value.trim()) {
        showError(name, 'Name is required');
        isValid = false;
    } else if(name.value.trim().length < 3) {
        showError(name, 'Name must be at least 3 characters');
        isValid = false;
    }
    
    // Validate phone
    if(!phone.value) {
        showError(phone, 'Phone number is required');
        isValid = false;
    } else if(phone.value.length !== 10) {
        showError(phone, 'Phone number must be 10 digits');
        isValid = false;
    }
    
    // Validate email
    if(!email.value) {
        showError(email, 'Email is required');
        isValid = false;
    } else if(!isValidEmail(email.value)) {
        showError(email, 'Please enter a valid email');
        isValid = false;
    }
    
    // Validate password
    if(!password.value) {
        showError(password, 'Password is required');
        isValid = false;
    } else if(password.value.length < 6) {
        showError(password, 'Password must be at least 6 characters');
        isValid = false;
    }
    
    // Validate confirm password
    if(!confirm.value) {
        showError(confirm, 'Please confirm your password');
        isValid = false;
    } else if(password.value !== confirm.value) {
        showError(confirm, 'Passwords do not match');
        isValid = false;
    }
    
    // Validate terms
    if(!terms.checked) {
        alert('Please accept Terms & Conditions');
        isValid = false;
    }
    
    if(isValid) {
        // Disable button
        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating Account...';
        
        // Check if email already exists
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        const existingUser = users.find(u => u.email === email.value);
        
        if(existingUser) {
            alert('❌ Email already registered! Please login.');
            window.location.href = 'log.html';
            return;
        }
        
        // Create user data
        const userData = {
            id: 'USER' + Date.now() + Math.random().toString(36).substr(2, 5),
            role: role.value,
            name: name.value.trim(),
            phone: phone.value,
            email: email.value.toLowerCase().trim(),
            password: password.value,
            joinDate: new Date().toISOString(),
            verified: false
        };
        
        // Save to localStorage
        users.push(userData);
        localStorage.setItem('users', JSON.stringify(users));
        
        // Success message
        setTimeout(() => {
            alert('✅ Registration successful! Please login.');
            window.location.href = 'log.html';
        }, 1000);
    }
});

/* 7. SHOW ERROR FUNCTION */
function showError(input, message) {
    const inputGroup = input.closest('.input-group');
    const errorDiv = inputGroup.querySelector('.error-message');
    
    inputGroup.classList.add('error');
    if(errorDiv) {
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
    }
}

/* 8. REAL-TIME VALIDATION */
document.getElementById('name').addEventListener('input', function() {
    const group = this.closest('.input-group');
    if(this.value.length >= 3) {
        group.classList.add('success');
        group.classList.remove('error');
        document.getElementById('nameError').style.display = 'none';
    } else {
        group.classList.remove('success');
    }
});

document.getElementById('email').addEventListener('input', function() {
    const group = this.closest('.input-group');
    if(isValidEmail(this.value)) {
        group.classList.add('success');
        group.classList.remove('error');
        document.getElementById('emailError').style.display = 'none';
    } else {
        group.classList.remove('success');
    }
});

document.getElementById('confirmPassword').addEventListener('input', function() {
    const password = document.getElementById('password').value;
    const group = this.closest('.input-group');
    
    if(this.value === password && this.value.length > 0) {
        group.classList.add('success');
        group.classList.remove('error');
        document.getElementById('confirmError').style.display = 'none';
    } else {
        group.classList.remove('success');
    }
});

/* 9. ACTIVE NAVIGATION */
(function() {
    const currentPage = 'signup.html';
    document.querySelectorAll('nav a').forEach(link => {
        const href = link.getAttribute('href');
        if(href === currentPage) {
            link.classList.add('active');
        }
    });
})();

/* 10. PREVENT FORM RESUBMISSION */
if (window.history.replaceState) {
    window.history.replaceState(null, null, window.location.href);
}
</script>
</body>
</html>
